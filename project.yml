name: Halfred
options:
  bundleIdPrefix: com.howard
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  Halfred:
    type: application
    platform: macOS
    sources:
      - Halfred
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.howard.halfred
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: Halfred/Halfred.entitlements
        INFOPLIST_FILE: Halfred/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
