name: Halfred
options:
  bundleIdPrefix: com.howard
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  Halfred:
    type: application
    platform: macOS
    sources:
      - Halfred
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.howard.halfred
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: Halfred/Halfred.entitlements
        INFOPLIST_FILE: Halfred/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: false
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: "76222M8V56"
          CODE_SIGNING_REQUIRED: true
    postBuildScripts:
      - script: |
          # Kill running Halfred in /Applications (if any)
          killall Halfred 2>/dev/null || true
          sleep 0.5
          # Copy built app to /Applications
          rm -rf /Applications/Halfred.app
          cp -R "${BUILT_PRODUCTS_DIR}/Halfred.app" /Applications/Halfred.app
          echo "Halfred installed to /Applications/Halfred.app"
        name: "Install to /Applications"
